<meta charset="utf-8" />

<title>소드마스터의 길 — M0 프로토타입</title>
<!--
  「소드마스터의 길」 M0 단일 파일 프로토타입 (프레임워크 금지 — 작업규칙 #1).
  판정 로직은 순수 함수(DOM 의존 없음, 규칙 #2). 수치는 DATA 블록에만(규칙 #3).
  판정 이벤트 규격 고정: {strokeId, accuracy, grade, inputMode, timestamp} (규칙 #4).
  구현 범위: T0-01~03, T0-04(검결 CommandCapture, 이번 작업), T0-07~09.
-->
<style>
  :root {
    --ink: #16130f; --bone: #e6dcc3; --gold: #c9a86a; --blood: #9c2f26;
    --panel: rgba(230, 220, 195, 0.06); --line: rgba(230, 220, 195, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: var(--ink); color: var(--bone);
    font-family: "Nanum Gothic", "Malgun Gothic", system-ui, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none; touch-action: none; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* 세로 방향 안내 (가로 고정) */
  #orient { position: fixed; inset: 0; z-index: 90; display: none;
    align-items: center; justify-content: center; background: var(--ink); text-align: center; padding: 2rem; }
  #orient .rot { font-size: 3rem; animation: spin 2.4s ease-in-out infinite; }
  @keyframes spin { 0%,100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }
  @media (orientation: portrait) { #orient { display: flex; } #app { filter: blur(3px); } }

  /* HUD */
  #hud { position: absolute; top: 0; left: 0; right: 0; padding: 10px 14px; z-index: 20;
    display: flex; gap: 18px; align-items: flex-start; pointer-events: none; }
  #gradeBox { min-width: 168px; }
  #grade { font-size: 30px; font-weight: 800; letter-spacing: 2px; line-height: 1.1; }
  #accLine { font-size: 13px; color: var(--gold); }
  #strokeName { font-size: 12px; opacity: .7; }
  .bars { flex: 1; max-width: 300px; }
  .bar { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 3px 0; opacity: .9; }
  .bar b { width: 34px; font-weight: 500; opacity: .8; }
  .track { flex: 1; height: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
  .fill { height: 100%; width: 0; background: var(--gold); transition: width .18s ease; }
  #comboBox { min-width: 190px; text-align: right; }
  #comboTitle { font-size: 12px; opacity: .6; }
  #comboSteps { font-size: 15px; letter-spacing: 1px; }
  #comboSteps .on { color: var(--gold); }
  #comboSteps .off { opacity: .35; }
  #manaLine { font-size: 12px; color: var(--gold); min-height: 16px; }
  #mastery { font-size: 10.5px; opacity: .55; margin-top: 2px; }

  /* 전투/제스처 면 */
  #stage { position: relative; flex: 1; }
  #ink { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 14px; opacity: .28; text-align: center; pointer-events: none; line-height: 1.7; }

  /* 가상 방향 패드 (검결, 모바일) */
  #pad { position: absolute; bottom: 14px; left: 0; right: 0; z-index: 15;
    display: flex; justify-content: space-between; padding: 0 18px; pointer-events: none; }
  .cluster { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px);
    gap: 6px; pointer-events: auto; }
  .key { display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px; color: var(--bone);
    opacity: .85; }
  .key:active, .key.hit { background: rgba(201,168,106,.28); border-color: var(--gold); color: var(--gold); }
  .key.empty { visibility: hidden; }

  /* 메트로놈 비트 표시 */
  #beatDot { position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%) scale(0.6);
    width: 14px; height: 14px; border-radius: 50%; background: var(--gold); opacity: 0; z-index: 14; }
  #beatDot.tick { animation: beatpulse .18s ease-out; }
  @keyframes beatpulse { 0% { opacity: .95; transform: translateX(-50%) scale(1.25); } 100% { opacity: 0; transform: translateX(-50%) scale(0.6); } }

  /* 검결 인식 토스트 */
  #cmdToast { position: absolute; bottom: 84px; left: 50%; transform: translateX(-50%);
    z-index: 16; font-size: 13px; color: var(--gold); background: rgba(22,19,15,.85);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; opacity: 0; transition: opacity .2s; }

  /* 컨트롤 */
  #ctrl { position: absolute; top: 8px; right: 12px; z-index: 25; display: flex; gap: 6px; }
  #ctrl button { font-size: 11px; color: var(--bone); background: var(--panel);
    border: 1px solid var(--line); border-radius: 7px; padding: 5px 8px; cursor: pointer; }
  #ctrl button.active { color: var(--gold); border-color: var(--gold); }

  /* 자가진단 패널 */
  #diag { position: absolute; left: 12px; bottom: 12px; z-index: 25; max-width: 46%;
    font-size: 10.5px; line-height: 1.5; color: var(--bone); background: rgba(22,19,15,.9);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; display: none; max-height: 44%; overflow: auto; }
  #diag .pass { color: #7fb98a; } #diag .fail { color: var(--blood); }
  #diag h4 { margin: 0 0 4px; font-size: 11px; color: var(--gold); }
</style>

<div id="app">
  <div id="hud">
    <div id="gradeBox">
      <div id="grade">—</div>
      <div id="accLine">긋거나(劍路) 커맨드(劍訣)로 시작</div>
      <div id="strokeName"></div>
    </div>
    <div class="bars">
      <div class="bar"><b>방향</b><div class="track"><div class="fill" id="fDir"></div></div></div>
      <div class="bar"><b>직선</b><div class="track"><div class="fill" id="fStr"></div></div></div>
      <div class="bar"><b>속도</b><div class="track"><div class="fill" id="fSpd"></div></div></div>
      <div class="bar"><b>완주</b><div class="track"><div class="fill" id="fCmp"></div></div></div>
    </div>
    <div id="comboBox">
      <div id="comboTitle">연풍참 (횡베기 → 사선↘)</div>
      <div id="comboSteps"></div>

      <div id="mastery"></div>
    </div>
  </div>

  <div id="stage">
    <canvas id="ink"></canvas>
    <div id="hint">검을 그어라 — 횡베기(→) · 사선(↘) · 내려찍기(↓)<br>또는 방향키/패드로 검결(劍訣)</div>
    <div id="pad"></div>
    <div id="cmdToast"></div>
    <div id="beatDot"></div>
  </div>

  <div id="ctrl">
    <button id="btnStyle">유파: 우수검류</button>
    <button id="btnMetro">메트로놈 OFF</button>
    <button id="btnSound" class="active">소리 ON</button>
    <button id="btnOverlay" class="active">오버레이 ON</button>
    <button id="btnDiag">자가진단</button>
  </div>
  <div id="diag"></div>
</div>

<div id="orient"><div><div class="rot">📱</div><p>가로로 돌려 주세요<br><small>전 씬 가로(landscape) 고정</small></p></div></div>

<script>
"use strict";
/* =========================================================================
 * DATA 블록 (규칙 #3: 모든 수치는 여기에만). M1에서 JSON 파일로 분리 예정.
 * ========================================================================= */
const BALANCE = {
  resample: 64,
  gradeCuts: { bad: 50, good: 70, great: 85, perfect: 95 },
  speedIdeal: { min: 120, max: 700 },   // ms
  minLenRatio: 0.12,
  rejectRatio: 0.035,
  classifyThreshold: 0.34,
  comboWindow: 1500,                     // 콤보 창(ms)
  weights: { direction: 0.40, straight: 0.30, speed: 0.15, completion: 0.15 },
  // 검결(劍訣, T0-04)
  simulMs: 70,                           // 동시키 인식 창(ms)
  commandResolveMs: 640,                 // 커맨드 버퍼 확정 대기(ms) — 늦은 2번째 비트(beatMs+배드창) 허용
  commandWindow: 1500,                   // 순차 입력 최대 간격(ms)
  arbiterStaleMs: 2000,                  // 점유 안전 해제(누락 방지 백스톱, T0-06)
  rhythm: { beatMs: 400, windows: { perfect: 50, great: 100, good: 180, bad: 280 } },  // 검결 리듬(T0-05)
};
// 획 3종 (우수검류 기준). path=이상 궤적, command=검결 커맨드 토큰.
// raw=이상 raw 입력 토큰 순서, rhythm=각 raw 토큰의 이상 오프셋(ms, 첫 입력 기준).
const STROKE_TEMPLATES = {
  h_lr:    { name: '횡베기(좌→우)', path: [[0, 0.5], [1, 0.5]], command: ['L', 'R'], raw: ['L', 'R'], rhythm: [0, 400] },  // ←→
  diag_dr: { name: '사선베기(↘)',   path: [[0, 0], [1, 1]],     command: ['DR'],     raw: ['D', 'R'], rhythm: [0, 0]   },  // ↓+→ 동시
  v_down:  { name: '내려찍기',        path: [[0.5, 0], [0.5, 1]], command: ['U', 'D'], raw: ['U', 'D'], rhythm: [0, 400] },  // ↑↓
};
// 소드 아츠 (초안 수치). 미스 한 획 = 발동 실패.
const TECHNIQUES = {
  yeonpung: { name: '연풍참', combo: ['h_lr', 'diag_dr'], window: 1500, cost: 15 },
};
// 유파(流派): mirrorX 변환 + ↑↓ 클러스터 방향. 새 유파=데이터 추가만.
const STYLES = {
  uraken: { name: '우수검류', mirrorX: false, updownCluster: 'right' },
  saken:  { name: '좌수검류', mirrorX: true,  updownCluster: 'left'  },
};
const MIRROR_TOK = { L: 'R', R: 'L', UL: 'UR', UR: 'UL', DL: 'DR', DR: 'DL', U: 'U', D: 'D' };

/* =========================================================================
 * 순수 판정 엔진 (DOM 의존 금지, 규칙 #2). node 회귀검증 16/16 통과분.
 * ========================================================================= */
function pathLength(pts) {
  let L = 0;
  for (let i = 1; i < pts.length; i++) L += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
  return L;
}
function bbox(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pts) { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); }
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}
function resample(pts, n) {
  if (pts.length < 2) return pts.slice();
  const total = pathLength(pts);
  const step = total / (n - 1);
  const out = [pts[0]];
  let acc = 0, i = 1, prev = pts[0];
  while (out.length < n && i < pts.length) {
    const d = Math.hypot(pts[i].x - prev.x, pts[i].y - prev.y);
    if (acc + d >= step && d > 1e-9) {
      const t = (step - acc) / d;
      const np = { x: prev.x + t * (pts[i].x - prev.x), y: prev.y + t * (pts[i].y - prev.y) };
      out.push(np); prev = np; acc = 0;
    } else { acc += d; prev = pts[i]; i++; }
  }
  while (out.length < n) out.push(pts[pts.length - 1]);
  return out;
}
// 크기 정규화(회전은 비정규화 — 방향이 획의 정체성). FR-JDG-002.
function normalize(pts) {
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  cx /= pts.length; cy /= pts.length;
  const t = pts.map(p => ({ x: p.x - cx, y: p.y - cy }));
  const b = bbox(t);
  const diag = Math.hypot(b.w, b.h) || 1;
  return t.map(p => ({ x: p.x / diag, y: p.y / diag }));
}
function meanDist(a, b) {
  let s = 0;
  for (let i = 0; i < a.length; i++) s += Math.hypot(a[i].x - b[i].x, a[i].y - b[i].y);
  return s / a.length;
}
function mirrorPoints(pts) { return pts.map(p => ({ x: -p.x, y: p.y, t: p.t })); }
const _tplCache = {};
function templatePoints(id) {
  if (_tplCache[id]) return _tplCache[id];
  const path = STROKE_TEMPLATES[id].path.map(([x, y]) => ({ x, y }));
  return (_tplCache[id] = normalize(resample(path, BALANCE.resample)));
}
function classify(normInput) {
  return Object.keys(STROKE_TEMPLATES)
    .map(id => ({ strokeId: id, dist: meanDist(normInput, templatePoints(id)) }))
    .sort((a, b) => a.dist - b.dist);
}
function gradeOf(acc) {
  const c = BALANCE.gradeCuts;
  if (acc >= c.perfect) return 'perfect';
  if (acc >= c.great) return 'great';
  if (acc >= c.good) return 'good';
  if (acc >= c.bad) return 'bad';
  return 'miss';
}
// 검로(劍路) 판정. FR-JDG-001. 반환: {rejected, reason} 또는 판정결과.
function judgeStroke(raw, meta, style) {
  style = style || STYLES.uraken;
  const canvasDiag = Math.hypot(meta.w, meta.h);
  if (!raw || raw.length < 2) return { rejected: true, reason: 'tap' };
  if (style.mirrorX) raw = mirrorPoints(raw);           // 유파를 정규(우수) 공간으로 접기
  const b = bbox(raw);
  const bDiag = Math.hypot(b.w, b.h);
  if (bDiag / canvasDiag < BALANCE.rejectRatio) return { rejected: true, reason: 'tap' };
  const pLen = pathLength(raw);
  if (pLen / canvasDiag < BALANCE.minLenRatio) return { rejected: true, reason: 'short' };

  const rs = resample(raw, BALANCE.resample);
  const norm = normalize(rs);
  const best = classify(norm)[0];
  if (best.dist > BALANCE.classifyThreshold) return { rejected: true, reason: 'unknown', dist: best.dist };

  const tpl = templatePoints(best.strokeId);
  // 방향 40%: 구간별 국소 방향 일치도(궤적 정밀도 — 흔들리면 하락). FR-JDG-004.
  const tVec = { x: tpl[tpl.length - 1].x - tpl[0].x, y: tpl[tpl.length - 1].y - tpl[0].y };
  const tLen = Math.hypot(tVec.x, tVec.y) || 1;
  const tux = tVec.x / tLen, tuy = tVec.y / tLen;
  let dsum = 0, dcnt = 0;
  for (let i = 1; i < rs.length; i++) {
    const sx = rs[i].x - rs[i - 1].x, sy = rs[i].y - rs[i - 1].y;
    const sl = Math.hypot(sx, sy);
    if (sl < 1e-9) continue;
    dsum += Math.max(0, (sx * tux + sy * tuy) / sl);
    dcnt++;
  }
  const dir01 = dcnt ? dsum / dcnt : 0;
  // 직선 30%: (현/경로)^2 — 정규화 공간. 흔들림 강하게 감점.
  const normChord = Math.hypot(norm[norm.length - 1].x - norm[0].x, norm[norm.length - 1].y - norm[0].y);
  const straight = Math.pow(Math.max(0, Math.min(1, normChord / (pathLength(norm) || 1))), 2);
  // 속도 15%: 이상 구간 밖은 선형 감쇠.
  const dur = (raw[raw.length - 1].t || 0) - (raw[0].t || 0);
  let speed;
  if (dur >= BALANCE.speedIdeal.min && dur <= BALANCE.speedIdeal.max) speed = 1;
  else if (dur < BALANCE.speedIdeal.min) speed = Math.max(0, dur / BALANCE.speedIdeal.min);
  else speed = Math.max(0, BALANCE.speedIdeal.max / dur);
  // 완주 15%: 정규화 끝점 정합.
  const dStart = Math.hypot(norm[0].x - tpl[0].x, norm[0].y - tpl[0].y);
  const dEnd = Math.hypot(norm[norm.length - 1].x - tpl[tpl.length - 1].x, norm[norm.length - 1].y - tpl[tpl.length - 1].y);
  const completion = Math.max(0, 1 - (dStart + dEnd) / 2);

  const w = BALANCE.weights;
  const acc = Math.max(0, Math.min(100, Math.round(
    100 * (w.direction * dir01 + w.straight * straight + w.speed * speed + w.completion * completion))));
  return { rejected: false, strokeId: best.strokeId, accuracy: acc, grade: gradeOf(acc),
    breakdown: { direction: dir01, straight, speed, completion }, dist: best.dist };
}

/* ----- 검결(劍訣) 커맨드 인식 — T0-04 순수부. FR-INP-006 ----- */
// 동시 입력(cardinal 쌍)을 대각 토큰으로 접기.
function collapseSimul(inputs, simulMs) {
  const CARD = { U: [0, -1], D: [0, 1], L: [-1, 0], R: [1, 0] };
  const DIAG = { '-1,-1': 'UL', '1,-1': 'UR', '-1,1': 'DL', '1,1': 'DR' };
  const out = [], used = new Array(inputs.length).fill(false);
  for (let i = 0; i < inputs.length; i++) {
    if (used[i]) continue;
    const a = inputs[i]; let merged = false;
    if (CARD[a.dir]) {
      for (let j = i + 1; j < inputs.length; j++) {
        if (used[j]) continue;
        const bb = inputs[j];
        if (!CARD[bb.dir] || Math.abs(bb.t - a.t) > simulMs) continue;
        const key = (CARD[a.dir][0] + CARD[bb.dir][0]) + ',' + (CARD[a.dir][1] + CARD[bb.dir][1]);
        if (DIAG[key]) { out.push({ dir: DIAG[key], t: Math.min(a.t, bb.t) }); used[i] = used[j] = true; merged = true; break; }
      }
    }
    if (!merged) { out.push({ dir: a.dir, t: a.t }); used[i] = true; }
  }
  return out.sort((x, y) => x.t - y.t);
}
// 버퍼 → (획ID 후보, 타임스탬프 시퀀스). T0-04 산출물.
function recognizeCommand(inputs, simulMs, style) {
  style = style || STYLES.uraken;
  if (style.mirrorX) inputs = inputs.map(i => ({ dir: MIRROR_TOK[i.dir] || i.dir, t: i.t }));
  const toks = collapseSimul(inputs, simulMs);
  const seq = toks.map(t => t.dir);
  for (const id of Object.keys(STROKE_TEMPLATES)) {
    const cmd = STROKE_TEMPLATES[id].command;
    if (cmd.length === seq.length && cmd.every((c, i) => c === seq[i])) {
      const span = toks.length >= 2 ? toks[toks.length - 1].t - toks[0].t : 0;
      const tightness = Math.max(0, Math.min(1, 1 - span / BALANCE.commandWindow));
      return { strokeId: id, tokens: toks, tightness };
    }
  }
  return null;
}

/* ----- 검결(劍訣) 리듬 판정 — T0-05 RhythmJudge. FR-JDG-005 ----- */
// 이상 비트 타임라인 대비 타이밍 오차. 퍼펙트±50/그레이트±100/굿±180/배드±280ms, 순서 오류=미스.
function expandRaw(inputs) {  // 패드 대각 단일 토큰을 raw 카디널 2개로 전개(동시각)
  const CARD = { UL: ['U', 'L'], UR: ['U', 'R'], DL: ['D', 'L'], DR: ['D', 'R'] };
  const out = [];
  for (const i of inputs) { if (CARD[i.dir]) for (const c of CARD[i.dir]) out.push({ dir: c, t: i.t }); else out.push({ dir: i.dir, t: i.t }); }
  return out;
}
function rhythmGradeAcc(maxErr) {
  const W = BALANCE.rhythm.windows;
  if (maxErr <= W.perfect) return { grade: 'perfect', accuracy: Math.round(100 - (maxErr / W.perfect) * 5) };
  if (maxErr <= W.great)   return { grade: 'great',   accuracy: Math.round(94 - ((maxErr - W.perfect) / (W.great - W.perfect)) * 9) };
  if (maxErr <= W.good)    return { grade: 'good',    accuracy: Math.round(84 - ((maxErr - W.great) / (W.good - W.great)) * 14) };
  if (maxErr <= W.bad)     return { grade: 'bad',     accuracy: Math.round(69 - ((maxErr - W.good) / (W.bad - W.good)) * 19) };
  return { grade: 'miss', accuracy: 0 };
}
// rawInputs = CommandCapture 버퍼(collapse 이전 {dir,t}). 순수(DOM無).
function judgeRhythm(rawInputs, strokeId, style) {
  style = style || STYLES.uraken;
  const rawCount = rawInputs.length;
  let ins = style.mirrorX ? rawInputs.map(i => ({ dir: MIRROR_TOK[i.dir] || i.dir, t: i.t })) : rawInputs.map(i => ({ dir: i.dir, t: i.t }));
  ins = expandRaw(ins).sort((a, b) => a.t - b.t);
  const spec = STROKE_TEMPLATES[strokeId];
  if (ins.length !== spec.raw.length) return { grade: 'miss', accuracy: 0, reason: 'count' };
  for (let i = 0; i < spec.raw.length; i++) if (ins[i].dir !== spec.raw[i]) return { grade: 'miss', accuracy: 0, reason: 'order' };
  const t0 = ins[0].t; let maxErr = 0; const errors = [];
  for (let i = 0; i < ins.length; i++) { const e = Math.abs((ins[i].t - t0) - spec.rhythm[i]); errors.push(Math.round(e)); if (e > maxErr) maxErr = e; }
  const ga = rhythmGradeAcc(maxErr);
  // 다입력(고난도) 정밀 성공 시 위력 +10% (패드 단일 대각 press 제외).
  const powerBonus = rawCount >= 2 && ga.grade !== 'miss' && maxErr <= BALANCE.rhythm.windows.great;
  return { grade: ga.grade, accuracy: ga.accuracy, maxErr, errors, powerBonus };
}

/* =========================================================================
 * 아래는 DOM/게임 계층 (M1 이식 대상 아님). 브라우저에서만 실행.

  /* ---- 콤보 트래커(T0-09): 연풍참 성립 + 마나 공식 ---- */
  function createComboTracker() {
    const tech = TECHNIQUES.yeonpung;
    let progress = [];   // [{strokeId, accuracy, t}]
    return {
      feed(ev) {
        const now = ev.timestamp;
        // 창 밖 입력은 리셋
        progress = progress.filter(p => now - p.t <= tech.window);
        const nextIdx = progress.length;
        if (ev.grade === 'miss' || ev.strokeId !== tech.combo[nextIdx]) {
          // 미스 or 조합 이탈 → 이 획으로 새로 시작 가능성만 유지
          progress = (ev.grade !== 'miss' && ev.strokeId === tech.combo[0]) ? [{ ...ev, t: now }] : [];
        } else {
          progress.push({ ...ev, t: now });
        }
        if (progress.length === tech.combo.length) {
          const avg = progress.reduce((s, p) => s + p.accuracy, 0) / progress.length;
          const mana = tech.cost * (2.0 - avg / 100);   // 마나 공식
          const power = avg >= 95 ? 1.2 : 1.0;

  const GRADE_KO = { perfect: '퍼펙트', great: '그레이트', good: '굿', bad: '배드', miss: '미스',
    tap: '거부(탭)', short: '거부(짧음)', unknown: '획 불명' };

  $('#btnStyle').addEventListener('click', e => {

    if (show) runSelfTest();
  });

  /* ---- 자가진단(T0-03/T0-04 회귀): 화면 패널 + 콘솔 ---- */
  function runSelfTest() {
    const META = { w: 800, h: 450 };
    const line = (from, to, n, dur, jit = 0) => { const o = []; for (let i = 0; i < n; i++) { const u = i / (n - 1); o.push({ x: from[0] + (to[0] - from[0]) * u + (jit ? Math.sin(u * Math.PI * 6) * jit : 0), y: from[1] + (to[1] - from[1]) * u + (jit ? Math.cos(u * Math.PI * 6) * jit : 0), t: dur * u }); } return o; };
    const T = [];
    const add = (name, ok, extra) => T.push({ name, ok, extra });
    let r;
    r = judgeStroke(line([100, 225], [700, 225], 40, 300), META); add('반듯 횡베기 = 그레이트+', !r.rejected && r.strokeId === 'h_lr' && r.accuracy >= 85, `${r.grade} ${r.accuracy}`);
    r = judgeStroke(line([100, 225], [700, 225], 60, 300, 80), META); add('흔들림 = 배드', !r.rejected && r.accuracy >= 50 && r.accuracy <= 69, `${r.grade} ${r.accuracy}`);
    r = judgeStroke(line([700, 225], [100, 225], 40, 300), META); add('역방향 = 획 불명', r.rejected && r.reason === 'unknown', r.reason);
    r = judgeStroke([{ x: 400, y: 225, t: 0 }, { x: 402, y: 226, t: 10 }], META); add('탭 = 거부', r.rejected && r.reason === 'tap', r.reason);
    r = judgeStroke(line([340, 225], [540, 225], 30, 220), META); add('작은 획 = 비율 인정', !r.rejected && r.strokeId === 'h_lr', `${r.grade} ${r.accuracy}`);
    r = judgeStroke(line([150, 60], [650, 400], 40, 320), META); add('사선 = diag_dr', !r.rejected && r.strokeId === 'diag_dr', r.accuracy);
    r = judgeStroke(line([400, 40], [400, 420], 40, 320), META); add('내려찍기 = v_down', !r.rejected && r.strokeId === 'v_down', r.accuracy);
    add('검결 ←→ = 횡베기', recognizeCommand([{ dir: 'L', t: 0 }, { dir: 'R', t: 180 }], BALANCE.simulMs)?.strokeId === 'h_lr');
    add('검결 ↓+→ 동시 = 사선', recognizeCommand([{ dir: 'D', t: 0 }, { dir: 'R', t: 25 }], BALANCE.simulMs)?.strokeId === 'diag_dr');
    add('검결 패드 ↘ 단일 = 사선', recognizeCommand([{ dir: 'DR', t: 0 }], BALANCE.simulMs)?.strokeId === 'diag_dr');
    add('검결 ↑↓ = 내려찍기', recognizeCommand([{ dir: 'U', t: 0 }, { dir: 'D', t: 150 }], BALANCE.simulMs)?.strokeId === 'v_down');
    add('검결 ↓후→(순차) ≠ 사선', recognizeCommand([{ dir: 'D', t: 0 }, { dir: 'R', t: 300 }], BALANCE.simulMs) === null);
    add('좌수: 우→좌 제스처=횡베기', (() => { const x = judgeStroke(line([700, 225], [100, 225], 40, 300), META, STYLES.saken); return !x.rejected && x.strokeId === 'h_lr'; })());
    add('좌수: 검결 →← = 횡베기', recognizeCommand([{ dir: 'R', t: 0 }, { dir: 'L', t: 180 }], BALANCE.simulMs, STYLES.saken)?.strokeId === 'h_lr');
    // T0-05 RhythmJudge
    add('리듬 ←0 →400 = 퍼펙트+보너스', (() => { const x = judgeRhythm([{ dir: 'L', t: 0 }, { dir: 'R', t: 400 }], 'h_lr'); return x.grade === 'perfect' && x.powerBonus; })());
    add('리듬 오차70 = 그레이트', judgeRhythm([{ dir: 'L', t: 0 }, { dir: 'R', t: 470 }], 'h_lr').grade === 'great');
    add('리듬 오차220 = 배드', judgeRhythm([{ dir: 'L', t: 0 }, { dir: 'R', t: 180 }], 'h_lr').grade === 'bad');
    add('리듬 오차350 = 미스', judgeRhythm([{ dir: 'L', t: 0 }, { dir: 'R', t: 50 }], 'h_lr').grade === 'miss');
    add('리듬 동시사선 오차30 = 퍼펙트', judgeRhythm([{ dir: 'D', t: 0 }, { dir: 'R', t: 30 }], 'diag_dr').grade === 'perfect');
    add('리듬 패드↘ 단일 = 퍼펙트·보너스無', (() => { const x = judgeRhythm([{ dir: 'DR', t: 0 }], 'diag_dr'); return x.grade === 'perfect' && !x.powerBonus; })());
    // T0-10 좌수 미러: 판정 품질 동등성(원본 vs 미러 x)
    const mir = (pts) => pts.map(p => ({ x: META.w - p.x, y: p.y, t: p.t }));
    const parity = (pts, id) => { const u = judgeStroke(pts, META, STYLES.uraken), s = judgeStroke(mir(pts), META, STYLES.saken); return !u.rejected && !s.rejected && u.strokeId === id && s.strokeId === id && Math.abs(u.accuracy - s.accuracy) <= 1; };
    add('좌수 품질동등: 횡베기 반듯', parity(line([100, 225], [700, 225], 40, 300), 'h_lr'));
    add('좌수 품질동등: 횡베기 흔들림', parity(line([100, 225], [700, 225], 60, 300, 60), 'h_lr'));
    add('좌수 품질동등: 내려찍기', parity(line([400, 40], [400, 420], 40, 320), 'v_down'));
    add('좌수 ↑↓ 클러스터=좌측', STYLES.saken.updownCluster === 'left' && STYLES.uraken.updownCluster === 'right');
    const passed = T.filter(t => t.ok).length;
    $('#diag').innerHTML = `<h4>자가진단 ${passed}/${T.length} 통과</h4>` +
      T.map(t => `<div class="${t.ok ? 'pass' : 'fail'}">${t.ok ? '✓' : '✗'} ${t.name}${t.extra != null ? ' · ' + t.extra : ''}</div>`).join('');
    console.log(`[소드마스터 자가진단] ${passed}/${T.length} 통과`);
  }

  /* ---- 부트 ---- */
  resize(); buildPad(); draw(); updateCombo(null); runSelfTest();
})();
</script>
