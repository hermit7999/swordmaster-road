<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>소드마스터의 길</title>
</head>
<body>
  <div id="app">
    <div id="sceneBg"></div>
    <div id="title">
      <div id="titleArt"></div>
      <div id="titleInner">
        <h1 id="titleName">소드마스터의 길</h1>
        <div id="titleSub">劍이 곧 눈이니, 보고서 응하라</div>
        <div id="titleTap">— 화면을 탭하여 시작 —</div>
        <div id="titleMenu">
          <button id="tNew">새 게임</button>
          <button id="tContinue">이어하기</button>
          <button id="tSettings">설정</button>
          <button id="tFeedback">피드백</button>
        </div>
      </div>
    </div>
    <div id="settings">
      <div id="setInner">
        <h2>설정</h2>
        <div class="setRow"><span>소리</span><div class="setOpts" data-key="sound"></div></div>
        <div class="setRow"><span>진동(햅틱)</span><div class="setOpts" data-key="haptic"></div></div>
        <div class="setRow"><span>판정 난이도</span><div class="setOpts" data-key="difficulty"></div></div>
        <div class="setRow"><span>대화 속도</span><div class="setOpts" data-key="dlgSpeed"></div></div>
        <div class="setRow"><span>가상키 크기</span><div class="setOpts" data-key="padSize"></div></div>
        <button id="setClose">닫기</button>
      </div>
    </div>
    <div id="hud">
      <div id="gradeBox">
        <div id="grade">—</div>
        <div id="accLine">긋거나(劍路) 커맨드(劍訣)로 시작</div>
        <div id="strokeName"></div>
        <div id="angDiag" style="font-size:11px;color:var(--gold);opacity:.85"></div>
      </div>
      <div class="bars">
        <div class="bar"><b>방향</b><div class="track"><div class="fill" id="fDir"></div></div></div>
        <div class="bar"><b>형태</b><div class="track"><div class="fill" id="fStr"></div></div></div>
        <div class="bar"><b>속도</b><div class="track"><div class="fill" id="fSpd"></div></div></div>
        <div class="bar"><b>완주</b><div class="track"><div class="fill" id="fCmp"></div></div></div>
      </div>
      <div id="playerHud"></div>
    </div>

    <div id="stage">
      <canvas id="ink"></canvas>
      <div id="hint">검을 그어라 — 횡베기(→) · 사선(↘) · 내려찍기(↓)<br>또는 방향키/패드로 검결(劍訣)</div>
      <div id="pad"></div>
      <div id="cmdToast"></div>
      <div id="beatDot"></div>
      <div id="comboBox">
        <div id="comboTitle">소드 아츠 (검술 6종)</div>
        <div id="comboSteps"></div>
        <div id="manaLine"></div>
        <div id="mastery"></div>
      </div>
    </div>

    <div id="ctrl">
      <button id="btnMap">지도</button>
      <button id="btnMetro">메트로놈 OFF</button>
      <button id="btnSound" class="active">소리 ON</button>
      <button id="btnOverlay" class="active">오버레이 ON</button>
      <button id="btnTrain">수련</button>
      <button id="btnCombat">결전</button>
      <button id="btnTrial">승급</button>
      <button id="btnDiag">자가진단</button>
    </div>
    <div id="diag"></div>
    <div id="train">
      <div id="trainMaster">—</div>
      <div id="trainTarget"></div>
      <div id="trainDots"></div>
      <div id="trainHint">스승의 궤적을 따라 그어라(劍路) · 방향키/패드로도 가능(劍訣, 메트로놈 켜면 비트)</div>
      <button id="trainExit">수련 종료</button>
    </div>
    <div id="combat">
      <div id="cbEnemyArt"><div id="cbSplash"></div></div>
      <div class="cbRow"><span id="cbEnemyName">적</span><div class="hpbar"><div id="cbEnemyHp" class="hpfill enemy"></div></div></div>
      <div id="cbPhase">—</div>
      <div id="cbTele"></div>
      <div id="cbLog"></div>
      <div id="cbItems"></div>
      <div class="cbRow"><span>나</span><div class="hpbar"><div id="cbPlayerHp" class="hpfill"></div></div></div>
      <div class="cbRow"><span>기</span><div class="mpbar"><div id="cbMana" class="mpfill"></div></div></div>
      <button id="cbExit">결전 종료</button>
    </div>
    <div id="trial">
      <div id="trialTitle"></div>
      <div id="trialSteps"></div>
      <div id="trialMaster">—</div>
      <div id="trialActions"><button id="trialRetry">재도전</button><button id="trialExit">종료</button></div>
    </div>
    <div id="shop">
      <div id="shopPortrait"></div>
      <div id="shopTitle">행상(行商)</div>
      <div id="shopGold"></div>
      <div id="shopList"></div>
      <div id="shopHint"></div>
      <button id="shopExit">떠나기</button>
    </div>
    <div id="dialogue">
      <div id="dlgPortrait" class="dlgPort"></div>
      <div id="dlgPortraitR" class="dlgPort right"></div>
      <div id="dlgBox">
        <div id="dlgSpeaker"></div>
        <div id="dlgText"></div>
        <div id="dlgChoices"></div>
        <div id="dlgTapHint">▶ 탭</div>
      </div>
      <div id="dlgCtrl">
        <button id="dlgAuto">자동</button>
        <button id="dlgSkip">건너뛰기</button>
      </div>
    </div>
    <div id="map">
      <div id="mapTitle"></div>
      <div id="mapBody"></div>
      <div id="mapHint"></div>
      <div id="mapActions"><button id="mapReset">처음부터</button><button id="mapExit">닫기</button></div>
    </div>
  </div>

  <div id="orient"><div><div class="rot">📱</div><p>가로로 돌려 주세요<br><small>전 씬 가로(landscape) 고정</small></p></div></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
